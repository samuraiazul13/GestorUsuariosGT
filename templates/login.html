<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{{url_for('static',filename='login.css')}}">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-4">Ingresar</h3>

        <form method="POST" action="{{url_for('login_form')}}">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="txtcontraseña" placeholder="Ingresar contraseña" required>
            </div>

            <button type="submit" class="button">Ingresar</button>

            <a href="#">¿Olvidaste tu contraseña?</a>
        </form>

    </div>
</div>

</body>
</html>
