<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Editar Usuario</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">

    </head>

    <body>
        <body>
    <!--creamos el modal-->
    <div class="container mt-5">
        <h2>EDITAR USUARIOS</h2>
        <form method="POST"action="{{ url_for('actualizar_usuarios')}}">
            <input type="hidden" name="id" value="{{usu[0]}}">
            <div class="mb-3">
                <label>USUARIO</label>
                <input type="text" name="txtusuario" class="form-control" value="{{usu[1]}}">
            </div>
            <div class="mb-3">
                <label>CONTRASEÑA </label>
                <input type="password" name="txtpassword" class="form-control" value="{{usu[2]}}">
            </div>
            <div class="mb-3">
                <label>ROL</label>
                <input type="text" name="txtrol" class="form-control" value="{{usu[3]}}" disabled>
            </div>
            <div class="mb-3">
                <label>DOCUMENTO</label>
                <input type="text" name="txtdocumento" class="form-control" value="{{usu[4]}}" disabled>
            </div>
            <button class="btn-primary">ACTUALIZAR</button>
            <a href="{{url_for('inicio')}}" class="btn-danger">Cancelar</a>
        </form>
    </body>
