<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
        <!-- llamar estilo de la pagina -->
    </head>

    <body>
    <!--creamos el modal-->
            <div class="modal" id="myModal">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <!--definir el header-->
                        <div class="modal-header">
                            <h4 class="modal-title">Registro de Usuarios</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <!--definir el cuerpo del modal---formulario-->
                        <div class="modal-body">
                            <form method="POST" action="">
                                <div class="mb-3 mt-3">
                                    <label>Ingresar nombre usuario</label>
                                    <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario">
                                </div>
                                <div class="mb-3">
                                    <label>Ingresar contraseña:</label>
                                    <input type="password" class="form-control" placeholder="Ingresar password" name="txtcontraseña">
                                </div>
                                <div class="mb-3">
                                    <label>Rol:</label>
                                    <select class="form-select" name="txtrol" required>
                                        <option value="">Seleccione el rol</option>
                                        <option value="Admin">Administrador</option>
                                        <option value="Empleado">Empleado</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label>Ingresar documento</label>
                                    <input type="number" class="form-control" placeholder="Ingresar documento usuario" name="txtdocumento">
                                </div>
                                <button type="submit" class="btn btn-danger" data-bs-dismiss="modal">Registrar</button>
                            </form>
                        </div>
                        <!--definir el pie de pagina del formulario-->
                        <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Registrar</button>
                        </div>
                    </div>
                </div>
            </div>
    </body>
</html>
