<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">

    </head>

    <body>
    <!--creamos el modal-->
<div class="modal" id="myModalusu">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h4 class="modal-title">Registro de Usuarios</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            
            <div class="modal-body">
                <form method="POST" action="/registrar_usuario">

                    <div class="mb-3">
                        <label>Nombre de usuario</label>
                        <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario" required>
                    </div>

                    <div class="mb-3">
                        <label>Contraseña</label>
                        <input type="password" class="form-control" name="txtcontraseña" placeholder="Ingresar contraseña" required>
                    </div>

                    <div class="mb-3">
                        <label>Rol</label>
                        <select class="form-select" name="txtrol" required>
                            <option value="">Seleccione el rol</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Empleado">Empleado</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Documento</label>
                        <input type="number" class="form-control" name="txtdocumento" placeholder="Ingresar documento" required>
                    </div>

                    <button type="submit" class="btn btn-success">Registrar</button>

                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
            </div>

        </div>
    </div>
</div>
    </body>
</html>
