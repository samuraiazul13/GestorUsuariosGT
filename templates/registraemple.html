<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">

    </head>

    <body>
    <!--creamos el modal-->
<div class="modal" id="myModalem">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h4 class="modal-title">Registrar Empleado</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            
            <div class="modal-body">
                <form method="POST" action="/registrar_empleado">

                    <div class="mb-3">
                        <label>Nombre del empleado</label>
                        <input type="text" class="form-control" name="txtnombre" placeholder="Ingresar nombre del empleado" required>
                    </div>

                    <div class="mb-3">
                        <label>Apellido del empleado</label>
                        <input type="text" class="form-control" name="txtapellido" placeholder="Ingresar apellido del empleado" required>
                    </div>

                    <div class="mb-3">
                        <label>Documento</label>
                        <input type="number" class="form-control" name="txtdocumento" placeholder="Ingresar documento" required>
                    </div>

                    <div class="mb-3">
                        <label>Cargo</label>
                        <select class="form-select" name="txtcargo" required>
                            <option value="">Seleccione el cargo</option>
                            <option value="Gerente">Gerente</option>
                            <option value="Administrativo">Administrativo</option>
                            <option value="Contador">Contador</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Departamento</label>
                        <select class="form-select" name="txtdepartamento" required>
                            <option value="">Seleccione el departamento</option>
                            <option value="Recursos Humanos">Recursos Humanos</option>
                            <option value="Sistemas">Sistemas</option>
                            <option value="Administración">Administración</option>
                            <option value="Contabilidad">Contabilidad</option>
                            <option value="Cafeteria">Cafetería</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Horas Extra</label>
                        <input type="number" class="form-control" name="txthorasextra" placeholder="Ingresar horas extra" required>
                    </div>

                    <div class="mb-3">
                        <label>Bonificación</label>
                        <input type="number" class="form-control" name="txtbonificacion" placeholder="Ingresar bonificación" required>
                    </div>

                    <button type="submit" class="btn btn-success">Registrar</button>

                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
            </div>

        </div>
    </div>
</div>
    </body>
</html>
