<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Editar Empleado</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">

    </head>

     <body>
        <body>
    <!--creamos el modal-->
    <div class="container mt-5">
        <h2>EDITAR EMPLEADOS</h2>
        <form method="POST" action="{{ url_for('actualizaremple', id=emple[0]) }}">
            <input type="hidden" name="id" value="{{emple[1]}}">
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" name="txtnombre" class="form-control" value="{{emple[2]}}">
            </div>
            <div class="mb-3">
                <label>Apellido</label>
                <input type="txt" name="txtapellido" class="form-control" value="{{emple[3]}}">
            </div>
            <div class="mb-3">
                        <label>Cargo</label>
                        <select class="form-select" name="txtcargo" value="{{emple[4]}}" required>
                            <option value="">Seleccione el cargo</option>
                            <option value="Gerente" {% if emple[4] == 'Gerente' %}selected{% endif %}>Gerente</option>
                            <option value="Administrativo" {% if emple[4] == 'Administrativo' %}selected{% endif %}>Administrativo</option>
                            <option value="Contador" {% if emple[4] == 'Contador' %}selected{% endif %}>Contador</option></select>
            </div>
            <div class="mb-3">
                        <label>Departamento</label>
                        <select class="form-select" name="txtdepartamento" value="{{emple[5]}}" required>
                            <option value="">Seleccione el departamento</option>
                            <option value="Recursos Humanos">Recursos Humanos</option>
                            <option value="Sistemas">Sistemas</option>
                            <option value="Administración">Administración</option>  
                            <option value="Contabilidad">Contabilidad</option>
                            <option value="Cafeteria">Cafetería</option>
                        </select>
                    </div>
            <div class="mb-3">
                <label>Horas Extra</label>
                <input type="text" name="txthorasextra" class="form-control" value="{{emple[6]}}">
            </div>
            <div class="mb-3">
                        <label>Bonificación</label>
                        <input type="number" class="form-control" name="txtbonificacion" placeholder="Ingresar bonificación" value="{{emple[7]}}" required>
                    </div>
            <button class="btn-primary">ACTUALIZAR</button>
            <a href="{{url_for('inicio')}}" class="btn-danger">Cancelar</a>
        </form>
    </body>
